<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MINEWORLD</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #87ceeb;
      }
      #app {
        display: block;
        cursor: pointer;
      }
      #menu {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: rgba(0, 0, 0, 0.55);
        font-family: 'Trebuchet MS', system-ui, sans-serif;
      }
      #menu h1 {
        margin: 0;
        font-size: 68px;
        font-weight: 800;
        letter-spacing: 6px;
        color: #fff;
        text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.55);
      }
      #menu .sub {
        margin-top: -14px;
        color: #cfcfcf;
        font-size: 15px;
      }
      #menu button {
        width: 340px;
        padding: 13px 0;
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        background: #6c6c6c;
        border: 2px solid #000;
        box-shadow:
          inset 2px 2px 0 rgba(255, 255, 255, 0.25),
          inset -2px -2px 0 rgba(0, 0, 0, 0.35);
        cursor: pointer;
      }
      #menu button:hover {
        background: #6f8f5a;
      }
      #menu .hint {
        margin-top: 6px;
        color: #b8b8b8;
        font-size: 13px;
        max-width: 480px;
        text-align: center;
        line-height: 1.6;
      }
      #underwater {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: none;
        background: rgba(28, 95, 150, 0.45);
      }
      #hotbar {
        position: fixed;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        display: flex;
        background: rgba(0, 0, 0, 0.45);
        border: 2px solid rgba(255, 255, 255, 0.22);
        outline: 2px solid rgba(0, 0, 0, 0.65);
        user-select: none;
      }
      .hotbar-slot {
        position: relative;
        width: 50px;
        height: 50px;
        box-sizing: border-box;
      }
      .hotbar-slot + .hotbar-slot {
        border-left: 1px solid rgba(255, 255, 255, 0.12);
      }
      .hotbar-icon {
        position: absolute;
        inset: 8px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        image-rendering: pixelated;
      }
      /* 选中：外凸的浅色框（同 MC 选择光标） */
      .hotbar-slot.selected::after {
        content: '';
        position: absolute;
        inset: -4px;
        border: 3px solid #eaeaea;
        box-shadow:
          0 0 0 1px #000,
          inset 0 0 0 1px #000;
        pointer-events: none;
      }
      #crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 18px;
        height: 18px;
        margin: -9px 0 0 -9px;
        pointer-events: none;
        opacity: 0.65;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: #fff;
        box-shadow: 0 0 1px #000;
      }
      #crosshair::before {
        left: 8px;
        top: 0;
        width: 2px;
        height: 18px;
      }
      #crosshair::after {
        top: 8px;
        left: 0;
        height: 2px;
        width: 18px;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="menu">
      <h1>MINEWORLD</h1>
      <div class="sub">体素沙盒 · Voxel Sandbox</div>
      <button id="play">开始游戏</button>
      <div class="hint">
        WASD 移动 · 鼠标看 · 左键挖 · 右键放 · 空格跳<br />
        双击 W 疾跑 · 数字键 1-9 / 滚轮 选方块 · ESC 暂停
      </div>
    </div>
    <div id="underwater"></div>
    <div id="crosshair"></div>
    <div id="hotbar"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
