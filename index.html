<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MINEWORLD</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #87ceeb;
      }
      #app {
        display: block;
        cursor: pointer;
      }
      #underwater {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: none;
        background: rgba(28, 95, 150, 0.45);
      }
      #hotbar {
        position: fixed;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        display: flex;
        padding: 3px;
        background: rgba(0, 0, 0, 0.35);
        border: 2px solid rgba(0, 0, 0, 0.55);
        border-radius: 3px;
        user-select: none;
      }
      .hotbar-slot {
        position: relative;
        width: 46px;
        height: 46px;
        margin: 2px;
        box-sizing: border-box;
        border: 2px solid #585858;
        background: rgba(139, 139, 139, 0.25);
      }
      .hotbar-slot.selected {
        border-color: #fff;
        box-shadow:
          0 0 0 2px #fff,
          inset 0 0 0 1px #fff;
      }
      .hotbar-icon {
        width: 100%;
        height: 100%;
        background-size: cover;
        image-rendering: pixelated;
      }
      .hotbar-num {
        position: absolute;
        top: 0;
        left: 3px;
        font: 700 12px sans-serif;
        color: #fff;
        text-shadow: 1px 1px 0 #000;
      }
      #crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 18px;
        height: 18px;
        margin: -9px 0 0 -9px;
        pointer-events: none;
        opacity: 0.65;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: #fff;
        box-shadow: 0 0 1px #000;
      }
      #crosshair::before {
        left: 8px;
        top: 0;
        width: 2px;
        height: 18px;
      }
      #crosshair::after {
        top: 8px;
        left: 0;
        height: 2px;
        width: 18px;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="underwater"></div>
    <div id="crosshair"></div>
    <div id="hotbar"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
