<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MINEWORLD</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #87ceeb;
      }
      #app {
        display: block;
        cursor: pointer;
      }
      #underwater {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: none;
        background: rgba(28, 95, 150, 0.45);
      }
      #hotbar {
        position: fixed;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        display: flex;
        background: rgba(0, 0, 0, 0.45);
        border: 2px solid rgba(255, 255, 255, 0.22);
        outline: 2px solid rgba(0, 0, 0, 0.65);
        user-select: none;
      }
      .hotbar-slot {
        position: relative;
        width: 50px;
        height: 50px;
        box-sizing: border-box;
      }
      .hotbar-slot + .hotbar-slot {
        border-left: 1px solid rgba(255, 255, 255, 0.12);
      }
      .hotbar-icon {
        position: absolute;
        inset: 8px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        image-rendering: pixelated;
      }
      /* 选中：外凸的浅色框（同 MC 选择光标） */
      .hotbar-slot.selected::after {
        content: '';
        position: absolute;
        inset: -4px;
        border: 3px solid #eaeaea;
        box-shadow:
          0 0 0 1px #000,
          inset 0 0 0 1px #000;
        pointer-events: none;
      }
      #crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 18px;
        height: 18px;
        margin: -9px 0 0 -9px;
        pointer-events: none;
        opacity: 0.65;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: #fff;
        box-shadow: 0 0 1px #000;
      }
      #crosshair::before {
        left: 8px;
        top: 0;
        width: 2px;
        height: 18px;
      }
      #crosshair::after {
        top: 8px;
        left: 0;
        height: 2px;
        width: 18px;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="underwater"></div>
    <div id="crosshair"></div>
    <div id="hotbar"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
